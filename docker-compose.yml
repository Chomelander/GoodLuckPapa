version: '3.8'

services:
  # Nginx：静态文件服务 + 反向代理到 Bun
  nginx:
    image: nginx:latest
    container_name: qiqi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./icon.svg:/usr/share/nginx/html/icon.svg:ro
      - ./manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./service-worker.js:/usr/share/nginx/html/service-worker.js:ro
      # HTTPS 证书（如果使用自签名或 Let's Encrypt）
      # - ./certs/cert.pem:/etc/nginx/certs/cert.pem:ro
      # - ./certs/key.pem:/etc/nginx/certs/key.pem:ro
    depends_on:
      - bun-api
    networks:
      - qiqi-net
    restart: unless-stopped

  # Bun：REST API 服务器
  bun-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: qiqi-bun
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-me}
      ACCESS_PIN: ${ACCESS_PIN:-1234}
      DATABASE_PATH: /data/sqlite.db
      PORT: 8080
    volumes:
      - qiqi-data:/data
    networks:
      - qiqi-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qiqi-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-/mnt/nas/qiqi-data}

networks:
  qiqi-net:
    driver: bridge
